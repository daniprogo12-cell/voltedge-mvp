name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Build Docker services
        run: docker compose build

      - name: Start Docker services
        run: |
          docker compose up -d
          sleep 15

      - name: Show running containers
        run: docker compose ps

      - name: Test Telemetry API
        run: curl --fail http://localhost:8001/healthcheck

      - name: Test Health API
        run: curl --fail http://localhost:8002/healthcheck

      - name: Test Maintenance API
        run: curl --fail http://localhost:8003/healthcheck

      - name: Test Dashboard
        run: curl --fail http://localhost:8004/dashboard

      - name: Test full telemetry flow
        run: |
          curl --fail -X POST http://localhost:8001/telemetry \
            -H "Content-Type: application/json" \
            -d '{"charger_id":"CH-CI-001","connector_id":"C-1","status":"offline","power_kw":0,"voltage":0,"current":0,"error_code":"E-CI","heartbeat":false}'

      - name: Print service logs if failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker services
        if: always()
        run: docker compose down